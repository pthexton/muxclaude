# muxclaude — example tmux key bindings for the F5/F6 popups.
#
# Source this from your own tmux.conf:
#
#     source-file ~/.claude/tmux/muxclaude.tmux.conf
#
# Then reload tmux config with `tmux source-file ~/.tmux.conf` (or your
# preferred reload-config keybinding).
#
# Both bindings only fire when the current window has @claude_ci_cache set —
# statusline.sh populates that whenever a Claude session is active in the
# window. Outside Claude windows, F5 and F6 pass through to whatever app is
# running so we don't steal the keys when they're not relevant.

# F5 — manual CI refresh (visible popup with progress + summary).
# Useful when statusline.sh's auto-refresh logic has settled on a terminal
# state and you want to force a fresh fetch (rerunning a flaky job, etc.).
bind-key -n F5 if-shell -F '#{!=:#{@claude_ci_cache},}' \
  'run-shell "$HOME/.claude/refresh-ci.sh"' \
  'send-keys F5'

# F6 — open the GitHub PR for the current branch in the default browser.
# Surfaces every failure path (no git repo, no PR, gh auth error, …) in a
# tmux popup rather than the slim status line, so the feedback is unmissable.
bind-key -n F6 if-shell -F '#{!=:#{@claude_ci_cache},}' \
  'run-shell "$HOME/.claude/open-pr.sh"' \
  'send-keys F6'
